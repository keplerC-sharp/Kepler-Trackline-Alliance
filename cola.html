<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX CONTROL — Cola de Turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

<div class="screen active" id="screen-dashboard" style="flex-direction:column;">

  <div class="topbar" id="topbar"></div>

  <div class="dashboard-body">
    <div class="sidebar" id="sidebar"></div>

    <div class="main-content">

      <div class="page-heading">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1>Cola de Turnos</h1>
            <p>Actualización en tiempo real vía SignalR</p>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="live-badge">
              <div class="live-dot"></div>
              Live Feed
            </div>
            <div class="signalr-badge">
              <div class="ping"></div>
              SignalR Connected
            </div>
          </div>
        </div>
      </div>

      <div class="queue-grid">
        <!-- LEFT: LISTA -->
        <div>
          <div class="row g-3 mb-4">
            <div class="col-4">
              <div class="stat-mini">
                <div class="stat-mini-val" id="statPending" style="color:var(--yellow);">0</div>
                <div class="stat-mini-label">Pendientes</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-mini">
                <div class="stat-mini-val" id="statActive" style="color:var(--green);">0</div>
                <div class="stat-mini-label">En Pista</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-mini">
                <div class="stat-mini-val" id="statDone" style="color:var(--text-muted);">0</div>
                <div class="stat-mini-label">Completados</div>
              </div>
            </div>
          </div>
          <div class="queue-list" id="queueList"></div>
        </div>

        <!-- RIGHT: TURNO ACTIVO + TIMER -->
        <div>
          <div class="z-panel" style="margin-bottom:16px;">
            <div class="panel-title"><i class="bi bi-person-check"></i> Turno Actual</div>
            <div class="panel-body" id="currentTurnPanel">
              <div style="text-align:center; padding:20px 0; color:var(--text-muted); font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase;">Sin turno activo</div>
            </div>
          </div>

          <div class="z-panel">
            <div class="panel-title"><i class="bi bi-clock"></i> Tiempo Restante</div>
            <div class="panel-body">
              <div class="big-timer" id="bigTimer">--:--</div>
              <div style="margin-top:10px;">
                <div class="progress-bar-wrap">
                  <div class="progress-bar-fill" id="mainProgressBar" style="width:0%;"></div>
                </div>
              </div>
              <div style="display:flex; justify-content:space-between; margin-top:16px; gap:8px;">
                <button class="btn-outline" style="flex:1; justify-content:center;" onclick="advanceQueue()">
                  <i class="bi bi-skip-forward-fill"></i> Avanzar
                </button>
                <a href="registro.html" class="btn-primary" style="flex:1; justify-content:center; text-decoration:none;">
                  <i class="bi bi-plus"></i> Nuevo
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-bar-item"><div class="dot blue"></div>Sat-Link Stable</div>
    <div class="bottom-bar-item"><div class="dot"></div>Local Server Nominal</div>
    <div class="bottom-bar-item" style="margin-left:auto;">Encrypted Pit-to-Car Channel 04 Active</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/cola.js"></script>
</body>
</html>
